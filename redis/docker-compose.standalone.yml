services:
  redis:
    image: redis:7.4.1
    container_name: redis
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: true
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - redis_network

volumes:
  redis_data:

networks:
  redis_network:
    driver: bridge